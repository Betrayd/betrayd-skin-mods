name: Release Cosmetics

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package skins
        run: |
          cd betrayd-skins
          zip -r ../betrayd-skins.jar .

      - name: Package hats
        run: |
          cd betrayd-hats
          zip -r ../betrayd-hats.jar .

      - name: Create Git tag
        run: |
          TAG="generated-${GITHUB_RUN_NUMBER}"
          git tag $TAG
          git push origin $TAG

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: Release auto-generated by .github/workflows/release.yml
          tag_name: generated-${{ github.run_number }}
          name: Generated Build ${{ github.run_number }}
          files: |
            betrayd-skins.jar
            betrayd-hats.jar
